# No explicit build directory needed for Next.js 13+ on Netlify
# Netlify's build process handles the Serverless functions automatically

# ── Long-term CDN caching for static brain frame images ──────────────────────
# These files are content-addressed by folder (webp/webp-mobile) so they never
# change. Telling Netlify to cache them for 1 year means:
#   • Edge nodes worldwide cache them → faster download for every user
#   • Repeat visits are near-instant (browser cache)
[[headers]]
  for = "/brain-frames-webp/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brain-frames-webp-mobile/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
